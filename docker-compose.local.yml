version: '3.8'

services:
  simplify-app:
    build: .
    container_name: simplify-language-local
    volumes:
      - ./logs:/app/logs
      - ./_streamlit_app:/app/_streamlit_app
    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434
      #- METRICS_PORT=8000
    ports:
      - "8501:8501"
      - "8000:8000"
    command: ["streamlit", "run", "/app/_streamlit_app/simplify-language.py", "--server.port=8501", "--server.address=0.0.0.0"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -s -f http://localhost:8501 || exit 0"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.simplify-local.rule=Host(`localhost`)"
      - "traefik.http.routers.simplify-local.entrypoints=websecure"
      - "traefik.http.routers.simplify-local.tls=true"
      - "traefik.http.services.simplify-local.loadbalancer.server.port=8501"
      - "traefik.http.routers.metrics-local.rule=Host(`localhost`) && PathPrefix(`/metrics`)"
      - "traefik.http.routers.metrics-local.entrypoints=websecure"
      - "traefik.http.routers.metrics-local.tls=true"
      - "traefik.http.services.metrics-local.loadbalancer.server.port=8000"
    networks:
      - traefik_network_local
  
  prometheus:
    image: prom/prometheus:latest
    container_name: simplify-prometheus-local
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data-local:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    restart: unless-stopped
    depends_on:
      simplify-app:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.prometheus-local.rule=Host(`localhost`) && PathPrefix(`/prometheus`)"
      - "traefik.http.routers.prometheus-local.entrypoints=websecure"
      - "traefik.http.routers.prometheus-local.tls=true"
      - "traefik.http.services.prometheus-local.loadbalancer.server.port=9090"
      - "traefik.http.middlewares.prometheus-strip-local.stripprefix.prefixes=/prometheus"
      - "traefik.http.routers.prometheus-local.middlewares=prometheus-strip-local"
    networks:
      - traefik_network_local
    
  grafana:
    image: grafana/grafana:latest
    container_name: simplify-grafana-local
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_SERVER_ROOT_URL=https://localhost/grafana
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - grafana-data-local:/var/lib/grafana
    ports:
      - "3000:3000"
    restart: unless-stopped
    depends_on:
      - prometheus
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana-local.rule=Host(`localhost`) && PathPrefix(`/grafana`)"
      - "traefik.http.routers.grafana-local.entrypoints=websecure"
      - "traefik.http.routers.grafana-local.tls=true"
      - "traefik.http.services.grafana-local.loadbalancer.server.port=3000"
      - "traefik.http.middlewares.grafana-strip-local.stripprefix.prefixes=/grafana"
      - "traefik.http.routers.grafana-local.middlewares=grafana-strip-local"
    networks:
      - traefik_network_local

  traefik:
    image: traefik:v2.10
    container_name: simplify-traefik-local
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      # For local development, skip certificate verification
      - "--serverstransport.insecureskipverify=true"
      - "--log.level=DEBUG"
      # Generate self-signed cert for websecure
      - "--experimental.localPlugins.traefik-selfsigned.moduleName=github.com/traefik/plugin-self-signed"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - traefik_network_local
    restart: unless-stopped

volumes:
  prometheus-data-local:
  grafana-data-local:
  traefik-data-local:

networks:
  traefik_network_local:
    name: traefik_network_local
